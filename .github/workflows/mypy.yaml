name: static type checking

on:
  pull_request:
  push:
    branches:
      - main
      - ci-dev

# Cancel superseded runs on the same PR branch; never cancel pushes (run_id is unique).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  mypy:
    name: Run MyPy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [airo-typing,airo-spatial-algebra,airo-camera-toolkit, airo-robots,airo-dataset-tools] #TODO: autodiscover?
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - uses: astral-sh/setup-uv@v4
      with:
        # Cache uv's wheel download/build cache so venv rebuilds (on a setup.py
        # change) don't re-download heavy deps like open3d/opencv/rerun-sdk.
        enable-cache: true
        cache-dependency-glob: "**/setup.py"

    - uses: actions/cache@v4
      id: cache-venv
      with:
        path: .venv
        key: venv-mypy-3.11-${{ hashFiles('**/setup.py') }}

    - name: Install packages
      if: steps.cache-venv.outputs.cache-hit != 'true'
      run: |
        uv venv .venv --python 3.11
        uv pip install --python .venv/bin/python mypy
        uv pip install --python .venv/bin/python airo-typing/ airo-spatial-algebra/ airo-camera-toolkit/ airo-robots/ airo-dataset-tools/

    - uses: actions/cache@v4
      with:
        path: .mypy_cache
        key: mypy-${{ matrix.package }}-${{ hashFiles('**/setup.py') }}
        restore-keys: mypy-${{ matrix.package }}-

    - name: Run type checker
      run: .venv/bin/mypy ${{ matrix.package }}/
