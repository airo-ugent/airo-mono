name: static type checking

on:
  pull_request:
  push:
    branches:
      - main
      - ci-dev

jobs:
  mypy:
    name: Run MyPy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [airo-typing,airo-spatial-algebra,airo-camera-toolkit, airo-robots,airo-dataset-tools] #TODO: autodiscover?
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Install workspace
      run: uv sync --python 3.11 --all-packages
    - name: Run type checker
      run: uv run mypy ${{matrix.package}}/
