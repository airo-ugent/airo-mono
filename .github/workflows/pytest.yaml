name: Run Tests

on:
  pull_request:
  push:
    branches:
      - main
      - ci-dev

# Cancel superseded runs on the same PR branch; never cancel pushes (run_id is unique).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        #os: [ubuntu-latest, windows-latest, macos-latest] # avoid this cost untill it becomes necessary..
        package: [airo-typing,airo-spatial-algebra, airo-camera-toolkit, airo-robots, airo-dataset-tools] #TODO: autodiscover?
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - uses: astral-sh/setup-uv@v4
      with:
        # Cache uv's wheel download/build cache so venv rebuilds (on a setup.py
        # change) don't re-download heavy deps like open3d/opencv/rerun-sdk.
        enable-cache: true
        cache-dependency-glob: "**/setup.py"
        # When the venv cache hits, the install step is skipped and uv never
        # runs, so its cache dir is absent — don't fail the post-step on that.
        ignore-nothing-to-cache: true

    - uses: actions/cache@v4
      id: cache-venv
      with:
        path: .venv
        # Includes source files, not just setup.py, so a change to any package's code
        # (not only its dependencies) invalidates this venv and gets reinstalled.
        # The separate uv wheel cache above is still keyed on setup.py only, so this
        # doesn't reintroduce heavy dependency re-downloads on every source change.
        key: venv-pytest-${{ matrix.python-version }}-${{ hashFiles('**/setup.py', '**/*.py') }}

    - name: Install packages
      if: steps.cache-venv.outputs.cache-hit != 'true'
      run: |
        uv venv .venv --python ${{ matrix.python-version }}
        uv pip install --python .venv/bin/python pytest nbmake
        uv pip install --python .venv/bin/python airo-typing/ airo-spatial-algebra/ airo-camera-toolkit/ airo-robots/ "airo-dataset-tools/[augmentations]"
        # albumentations (via [augmentations]) and fiftyone (via [fiftyone]) both pull in
        # opencv-python-headless, which conflicts with opencv-contrib-python — whichever is
        # installed last overwrites the cv2 namespace. Force-reinstall contrib so it wins.
        OPENCV_VERSION=$(grep -oP 'opencv-contrib-python==\K[0-9.]+' airo-dataset-tools/setup.py | head -1)
        uv pip install --python .venv/bin/python --force-reinstall "opencv-contrib-python==$OPENCV_VERSION"

    - name: Run Tests
      run: .venv/bin/pytest ${{ matrix.package }}/

    - name: Run Notebooks
      # cannot use glob pattern because that fails if no notebooks are found (in which case the glob pattern is empty.)
      # so cannot do something like pytest --nbmake ${{matrix.package}}/**/*.ipynb
      # and we also don't want to re-execute all regular tests (pytest --nbmake .)
      # so manually iterate over all files and run pytest --nbmake on each one.

      # don't forget to enable glob! https://github.com/orgs/community/discussions/25638
      run: |
        .venv/bin/python -m ipykernel install --user --name airo-mono
        shopt -s globstar nullglob
        echo "Testing notebooks..."
        for nb in ${{ matrix.package }}/**/*.ipynb; do
          .venv/bin/pytest --nbmake "$nb";
        done
